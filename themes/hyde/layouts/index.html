{{ define "main" -}}
  {{ with .Site.GetPage "/about.md" -}}
    <h1>{{ .Title }}</h1>
  {{- end }}
  {{ with .Site.GetPage "/posts" -}}
    <ul class="section-list">
    {{ range .Sections.ByWeight -}}
      <li>
        <a href="{{ .Permalink }}">{{ .Title }}</a>
      </li>
    {{- end }}
    </ul>
  {{- end }}
{{- end }}
