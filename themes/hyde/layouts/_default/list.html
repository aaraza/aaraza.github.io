{{ define "main" -}}
<h2>{{ .Title }}</h2>
<ul class="post-list">
{{ range where .Data.Pages "Title" "ne" "recommended" -}}
  <li>
    <a href="{{ .Permalink }}">{{ .Title }}</a>
    {{ if not .Date.IsZero }}<time class="post-list-date">{{ .Date.Format "Jan 2, 2006" }}</time>{{ end }}
  </li>
{{- end }}
</ul>

{{ with .GetPage "recommended" }}
<section class="recommended">
  <h2>Recommended</h2>
  {{ .Content }}
</section>
{{ end }}
{{- end }}
